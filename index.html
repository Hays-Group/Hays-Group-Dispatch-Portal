<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hays Group Global Dispatch System v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111827;--c:#1F2937;--b:#374151;--g:#B8935A;--gn:#10B981;--rd:#EF4444;--or:#F59E0B;--bl:#3B82F6;--w:#F9FAFB;--gy:#6B7280;--gd:#374151;--gl:#9CA3AF;--pp:#8B5CF6}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--w);font-size:13px}
.H{display:none!important}button{cursor:pointer}input,select,textarea{font-family:inherit}
.hdr{background:var(--c);border-bottom:2px solid var(--g);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.tab{padding:6px 12px;border:none;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:transparent;color:var(--gy)}
.tab.on{background:var(--g);color:#111}
.gm{display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 50px)}
.sc{overflow:auto;padding:16px}.sb{background:var(--c);border-left:1px solid var(--b);overflow:auto}
.st{background:var(--c);border:1px solid var(--b);padding:12px;text-align:center}
.sn{font-size:26px;font-weight:800}.sl{font-size:9px;color:var(--gy);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.jb{border:1px solid var(--b);margin-bottom:8px;background:var(--c)}
.jh{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-left:3px solid var(--g)}
.rr{padding:8px 12px;border-top:1px solid rgba(255,255,255,.03);display:grid;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dg{background:var(--gn)}.dr{background:var(--rd)}.dy{background:var(--or)}
.pl{width:20px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.po{background:rgba(184,147,90,.15);color:var(--g);border:1px solid rgba(184,147,90,.25)}
.px{background:rgba(255,255,255,.02);color:var(--gd);border:1px solid rgba(255,255,255,.04)}
.bf{background:var(--g);color:#111;border:none;padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:1px}
.br{background:transparent;border:1px solid rgba(239,68,68,.2);color:var(--rd);padding:3px 8px;font-size:10px;font-weight:600}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200}
.mx{background:var(--c);border:2px solid var(--g);width:620px;max-height:85vh;overflow:auto}
.cr{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.03);display:grid;grid-template-columns:1fr 80px 50px 90px 55px;align-items:center;gap:6px;cursor:pointer}
.cr:hover{background:rgba(184,147,90,.04)}
.dt{width:50px;padding:8px 0;text-align:center;font-weight:700;font-size:12px;cursor:pointer;border:1px solid var(--b)}
.dt.on{background:rgba(184,147,90,.15);border-color:rgba(184,147,90,.3);color:var(--g)}
.fw{max-width:640px;margin:0 auto;padding:12px 16px}
.fl{font-size:10px;font-weight:700;color:var(--gy);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;display:block}
.fi{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid var(--b);color:var(--w);font-size:13px;outline:none}
.fs{width:100%;padding:10px;background:var(--c);border:1px solid var(--b);color:var(--w);font-size:13px;outline:none}
.fs option{background:var(--c);color:var(--w)}
.fa{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed rgba(184,147,90,.3);color:var(--g);padding:8px;font-size:11px;font-weight:600;width:100%;justify-content:center;margin-top:6px}
.fr{background:transparent;border:none;color:var(--rd);font-size:16px;padding:0 4px;cursor:pointer}
.dytb{flex:1;min-width:40px;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.02);color:var(--gy)}
.dytb.on{background:rgba(184,147,90,.15);border-color:rgba(184,147,90,.4);color:var(--g)}
.sb2{width:100%;padding:14px;margin-top:12px;background:var(--g);color:#111;border:none;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.sb2:disabled{opacity:.4;cursor:default}
.fb{padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--b);background:transparent;color:var(--gy);cursor:pointer}
.fb.on{background:rgba(184,147,90,.12);border-color:rgba(184,147,90,.25);color:var(--g)}
.ss{padding:12px;border-bottom:1px solid var(--b)}
.ec{padding:8px;background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.1);margin-bottom:6px;font-size:11px;cursor:pointer}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lb{width:400px;text-align:center}
.lg{width:160px;margin:0 auto 24px;display:block;border-radius:8px}
.lt{display:flex;border:1px solid var(--b);margin-bottom:20px}
.lt button{flex:1;padding:10px;border:none;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.lf{background:var(--c);border:1px solid var(--b);padding:24px}
.li{width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid var(--b);color:var(--w);font-size:14px;margin-bottom:12px;outline:none}
.lb2{width:100%;padding:12px;background:var(--g);color:#111;border:none;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:16px}
.qb{padding:10px;border:1px solid var(--b);background:rgba(255,255,255,.02);color:var(--gl);font-size:11px;font-weight:600}
.qb:hover{border-color:var(--g);color:var(--g)}
.score-bar{display:flex;gap:1px;margin-top:2px}
.score-pip{width:8px;height:8px}
.modal-tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:12px}
.modal-tab{padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;background:transparent;color:var(--gy);cursor:pointer}
.modal-tab.on{color:var(--g);border-bottom:2px solid var(--g)}
.profile-section{margin-bottom:16px;padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--b)}
.profile-section-title{font-size:10px;font-weight:700;color:var(--g);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.chip{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;margin:2px;letter-spacing:.5px}
.chip-g{background:rgba(16,185,129,.1);color:var(--gn);border:1px solid rgba(16,185,129,.2)}
.chip-b{background:rgba(59,130,246,.1);color:var(--bl);border:1px solid rgba(59,130,246,.2)}
.chip-p{background:rgba(139,92,246,.1);color:var(--pp);border:1px solid rgba(139,92,246,.2)}
.chip-o{background:rgba(245,158,11,.1);color:var(--or);border:1px solid rgba(245,158,11,.2)}
.chip-r{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.restrict-tag{font-size:10px;color:var(--rd);padding:2px 6px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.1);margin:2px;display:inline-block}
@media(max-width:768px){.gm{grid-template-columns:1fr}.sb{display:none}}</style>
</head><body>

// ========== API LAYER ==========
async function apiGet(action, params) {
  if (!API) return null;
  let url = API + '?action=' + action;
  if (params) Object.keys(params).forEach(k => { url += '&' + k + '=' + encodeURIComponent(params[k]); });
  try {
    const r = await fetch(url);
    return await r.json();
  } catch (e) { console.error('API GET error:', e); return null; }
}

async function apiPost(action, data) {
  if (!API) return null;
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...data })
    });
    return await r.json();
  } catch (e) { console.error('API POST error:', e); return null; }
}

// Load all data from Google Sheet on startup
async function loadFromSheet() {
  if (!API) { console.log('No API configured, using seed data.'); return; }
  const showLoading = () => {
    const el = document.getElementById('main') || document.getElementById('app');
    if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--gy)"><div style="text-align:center"><div style="font-size:14px;margin-bottom:8px">Loading dispatch data...</div><div style="font-size:10px">Connecting to Google Sheets</div></div></div>';
  };
  showLoading();

  const data = await apiGet('load', { week: curWeek });
  if (!data || data.error) { console.error('Load failed:', data); return; }

  // Hydrate employees from sheet
  if (data.employees && data.employees.length) {
    W.length = 0;
    data.employees.forEach(e => {
      W.push({
        id: +e.EE_ID,
        n: e.Name,
        p: e.Position,
        e: e.Entity,
        ph: e.Phone || '',
        c: e.City || '',
        q: tryParse(e.Qualifications, []),
        eq: tryParse(e.EquipCerts, []),
        sf: tryParse(e.SafetyCreds, []),
        bd: tryParse(e.ClientBadges, []),
        sc: [+e.Score_Quality||1, +e.Score_EquipCare||1, +e.Score_Safety||1, +e.Score_Punctuality||1, +e.Score_Teamwork||1],
        st: e.Status || 'active',
        rate: parseFloat(e.BurdenedRate) || 0,
        res: tryParse(e.Restrictions, []),
        offReason: e.OffboardReason || '',
        offNotes: e.OffboardNotes || '',
        offDate: e.OffboardDate || ''
      });
    });
  }

  // Hydrate jobs
  if (data.jobs && data.jobs.length) {
    JOBS.length = 0;
    data.jobs.forEach(j => {
      JOBS.push({
        id: String(j.JobID),
        nm: j.JobName,
        cl: j.Client,
        pm: j.PM,
        addr: j.Address,
        sch: j.Schedule,
        start: j.StartTime,
        ent: j.Entity,
        pw: +j.PrevailingWage || 0,
        reqBadge: j.ReqBadge || '',
        reqCerts: tryParse(j.ReqCerts, []),
        startDt: j.StartDate || '',
        endDt: j.EndDate || ''
      });
    });
  }

  // Hydrate requests
  if (data.requests && data.requests.length) {
    RQ.length = 0;
    data.requests.forEach(r => {
      RQ.push({
        id: +r.ReqID,
        j: String(r.JobID),
        by: r.RequestedBy,
        pos: r.Position,
        per: r.SpecificPerson || null,
        d: { MON: +r.MON||0, TUE: +r.TUE||0, WED: +r.WED||0, THU: +r.THU||0, FRI: +r.FRI||0, SAT: +r.SAT||0, SUN: +r.SUN||0 },
        nt: r.Notes || '',
        eq: r.Equipment || '',
        st: r.Status || 'approved',
        pr: r.Priority || 'normal'
      });
    });
  }

  // Hydrate assignments
  if (data.assignments) {
    Object.keys(assigns).forEach(k => delete assigns[k]);
    data.assignments.forEach(a => { assigns[+a.ReqID] = +a.WorkerID; });
  }

  // Hydrate hotels
  if (data.hotels) {
    Object.keys(hotels).forEach(k => delete hotels[k]);
    data.hotels.forEach(h => { hotels[+h.WorkerID] = { hotel: h.HotelName, conf: h.ConfirmationNum }; });
  }

  // Hydrate daily notes
  if (data.dailyNotes) {
    Object.keys(dailyNotes).forEach(k => delete dailyNotes[k]);
    data.dailyNotes.forEach(d => { dailyNotes[d.Key] = d.Notes; });
  }

  // Hydrate eq on site
  if (data.eqOnSite) {
    Object.keys(eqOnSite).forEach(k => delete eqOnSite[k]);
    data.eqOnSite.forEach(e => { eqOnSite[e.JobID] = e.Equipment; });
  }

  // Hydrate start overrides
  if (data.startOverrides) {
    Object.keys(startOverrides).forEach(k => delete startOverrides[k]);
    data.startOverrides.forEach(s => { startOverrides[s.Key] = s.Time; });
  }

  console.log('Loaded from Google Sheets:', W.length, 'employees,', JOBS.length, 'jobs,', RQ.length, 'requests');
}

function tryParse(val, fallback) {
  if (!val) return fallback;
  if (Array.isArray(val)) return val;
  try { return JSON.parse(val); } catch (e) { return fallback; }
}

// ========== FILL MODAL ==========
function openFill(rId){
  const r=RQ.find(x=>x.id===rId);if(!r)return;
  const job=jb(r.j);
  // Filter candidates
  const active=W.filter(w=>w.st==='active');
  // Sort: qualified first, then by score
  const scored=active.map(w=>{
    const qMatch=w.q.includes(r.pos);
    const badgeOk=!job.reqBadge||w.bd.includes(job.reqBadge);
    const conflict=Object.entries(r.d).some(([d,v])=>{
      if(!v)return false;
      return RQ.some(r2=>r2.id!==rId&&assigns[r2.id]===w.id&&r2.d[d]);
    });
    const hasRestriction=w.res&&w.res.length>0;
    return{w,qMatch,badgeOk,conflict,hasRestriction,avg:avgSc(w.sc)};
  });
  scored.sort((a,b)=>{
    if(a.qMatch!==b.qMatch)return a.qMatch?-1:1;
    if(a.conflict!==b.conflict)return a.conflict?1:-1;
    return b.avg-a.avg;
  });

  let html=`<div class="mb" onclick="if(event.target===this)closeModal()"><div class="mx">
    <div style="padding:12px;border-bottom:2px solid var(--g);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700">FILL: ${h(r.pos)}</div>
        <div style="font-size:10px;color:var(--gy)">${h(job.nm)} | ${h(job.cl)}${job.reqBadge?` | <span style="color:var(--or)">Requires ${h(job.reqBadge)} badge</span>`:''}</div>
        ${r.per?`<div style="font-size:10px;color:var(--g)">Requested: ${h(r.per)}</div>`:''}
      </div>
      <button class="br" onclick="closeModal()">&#10005; CLOSE</button>
    </div>
    <div style="padding:8px 12px;border-bottom:1px solid var(--b)">
      <input id="fillSearch" oninput="filterFill()" placeholder="Search workers..." style="width:100%;padding:6px;background:rgba(255,255,255,.05);border:1px solid var(--b);color:var(--w);font-size:12px">
    </div>
    <div id="fillList" style="max-height:55vh;overflow:auto">`;

  scored.forEach(({w,qMatch,badgeOk,conflict,avg})=>{
    const grd=scGrade(avg);
    const warns=[];
    if(!qMatch)warns.push('<span style="color:var(--or)">Not qualified</span>');
    if(!badgeOk)warns.push(`<span style="color:var(--rd)">No ${job.reqBadge} badge</span>`);
    if(conflict)warns.push('<span style="color:var(--rd)">CONFLICT</span>');
    w.res.forEach(rs=>warns.push(`<span class="restrict-tag">${h(rs)}</span>`));

    html+=`<div class="cr" data-name="${w.n.toLowerCase()}" onclick="doFill(${rId},${w.id})">
      <div>
        <div style="font-weight:700;font-size:12px">${h(w.n)}</div>
        <div style="font-size:9px;color:${entColor(w.e)}">${w.e} | ${h(w.p)} | ${h(w.c)}</div>
        <div style="font-size:9px;color:var(--gy)">${w.q.join(', ')}</div>
        ${warns.length?`<div style="margin-top:2px">${warns.join(' ')}</div>`:''}
      </div>
      <div style="text-align:center">
        <div class="score-bar">${scPips(w.sc)}</div>
        <div style="font-size:16px;font-weight:800;color:${grd.c};margin-top:2px">${grd.g}</div>
        <div style="font-size:9px;color:var(--gy)">${avg.toFixed(1)}</div>
      </div>
      <div style="font-size:10px;color:var(--gy)">$${w.rate}</div>
      <div>${w.eq.length?w.eq.map(e=>`<span class="chip chip-b">${e}</span>`).join(''):'<span style="font-size:9px;color:var(--gy)">-</span>'}</div>
      <div>${w.bd.length?w.bd.map(b=>`<span class="chip chip-o">${b}</span>`).join(''):'<span style="font-size:9px;color:var(--gy)">-</span>'}</div>
    </div>`;
  });
  html+=`</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
  setTimeout(()=>document.getElementById('fillSearch')?.focus(),100);
}
function filterFill(){
  const q=document.getElementById('fillSearch').value.toLowerCase();

  const qty=Math.max(1,+$('#rqQty').value);

  for(let i=0;i<qty;i++){
    var nr={
      id:RQ.length+1,j:$('#rqJob').value,by:user.n,d:{...days},pos:$('#rqPos').value,
      per:qty===1?$('#rqPer').value:null,
      nt:$('#rqNt').value+(qty>1?` (${i+1} of ${qty})`:''),
      eq:i===0?$('#rqEq').value:'',st:'approved',pr:$('#rqPr').value

  alert(`${qty} request(s) submitted.`);

// ========== PUBLISH / PDF ==========
function publishDispatch(){
  const rqs=RQ.filter(r=>r.st==='approved'&&assigns[r.id]);
  if(!rqs.length){alert('No assignments to publish');return;}
  // Group by worker for crew texts
  const byWorker={};
  rqs.forEach(r=>{
    const wId=assigns[r.id];
    if(!byWorker[wId])byWorker[wId]=[];
    byWorker[wId].push(r);
  });
  let preview="DISPATCH PUBLISH PREVIEW\n========================\n\n";
  preview+="CREW TEXTS:\n";
  Object.entries(byWorker).forEach(([wId,wRqs])=>{
    const w=wk(+wId);if(!w)return;
    const r=wRqs[0];const job=jb(r.j);
    const days=DAYS.filter(d=>r.d[d]).map(d=>DF[d]).join(', ');
    const htl=hotels[w.id];
    preview+=`\nTo: ${w.n} (${w.ph})\n`;
    preview+=`"${job.nm} - ${job.cl}\n${job.addr}\n${days}\nStart: ${job.start}\nPosition: ${r.pos}\n`;
    if(r.eq)preview+=`Equipment: ${r.eq}\n`;
    if(htl)preview+=`Hotel: ${htl.hotel} - Conf#: ${htl.conf}\n`;
    preview+=`"\n`;
  });

  // Global summary
  let totalCost=0,totalHrs=0;
  rqs.forEach(r=>{
    const w=wk(assigns[r.id]);if(!w)return;
    const job=jb(r.j);const hpd=job&&job.sch==='4x10s'?10:8;
    const days=Object.values(r.d).filter(v=>v).length;
    totalHrs+=days*hpd;totalCost+=days*hpd*w.rate;
  });
  preview+=`\n\nGLOBAL SUMMARY:\nTotal Workers: ${Object.keys(byWorker).length}\nTotal Manhours: ${totalHrs}\nEst. Labor Cost: $${totalCost.toLocaleString(undefined,{maximumFractionDigits:0})}\n`;

  syncPublish();
  alert(preview);
}

function previewPDF(){
  const rqs=RQ.filter(r=>r.st==='approved');
  const jobIds=[...new Set(rqs.map(r=>r.j))];
  let totalCost=0,totalHrs=0;

  let html=`<div class="mb" onclick="if(event.target===this)closeModal()"><div class="mx" style="width:700px;max-height:90vh">
    <div style="padding:12px;border-bottom:2px solid var(--g);display:flex;justify-content:space-between;align-items:center">
      <div style="font-weight:700;font-size:16px">DISPATCH REPORT: ${wkLabel(curWeek)}</div>
      <button class="br" onclick="closeModal()">&#10005;</button>
    </div>
    <div style="padding:16px;overflow:auto;max-height:75vh;font-size:11px">`;

  jobIds.forEach(jid=>{
    const job=jb(jid);if(!job)return;
    const jrqs=rqs.filter(r=>r.j===jid);
    let jobCost=0,jobHrs=0;
    html+=`<div style="margin-bottom:16px;border:1px solid var(--b);padding:8px">
      <div style="font-weight:700;font-size:13px;border-bottom:1px solid var(--b);padding-bottom:4px;margin-bottom:6px">${h(job.nm)} (${h(job.id)})</div>
      <div style="font-size:10px;color:var(--gy);margin-bottom:6px">${h(job.cl)} | PM: ${h(job.pm)} | ${h(job.start)} | ${h(job.addr)}</div>
      ${eqOnSite[jid]?`<div style="font-size:10px;color:var(--or);margin-bottom:6px">On Site: ${h(eqOnSite[jid])}</div>`:''}
      <table style="width:100%;border-collapse:collapse">
        <tr style="font-size:9px;color:var(--gy);text-transform:uppercase;letter-spacing:1px">
          <th style="text-align:left;padding:4px">Name</th><th style="text-align:left;padding:4px">Position</th>
          <th style="text-align:left;padding:4px">Entity</th><th style="text-align:center;padding:4px">Days</th>
          <th style="text-align:center;padding:4px">Hrs</th><th style="text-align:right;padding:4px">Rate</th>
          <th style="text-align:right;padding:4px">Cost</th>
        </tr>`;
    jrqs.forEach(r=>{
      const a=assigns[r.id];const w=a?wk(a):null;
      const days=Object.values(r.d).filter(v=>v).length;
      const hpd=job.sch==='4x10s'?10:8;
      const hrs=days*hpd;
      const cost=w?hrs*w.rate:0;
      jobCost+=cost;jobHrs+=hrs;totalCost+=cost;totalHrs+=hrs;
      html+=`<tr style="border-top:1px solid rgba(255,255,255,.04)">
        <td style="padding:4px">${w?h(w.n):'<span style="color:var(--rd)">UNFILLED</span>'}</td>
        <td style="padding:4px;color:var(--gy)">${h(r.pos)}</td>
        <td style="padding:4px;color:${w?entColor(w.e):'var(--gy)'}">${w?w.e:'-'}</td>
        <td style="padding:4px;text-align:center">${days}</td>
        <td style="padding:4px;text-align:center">${hrs}</td>
        <td style="padding:4px;text-align:right;color:var(--gy)">${w?'$'+w.rate.toFixed(2):'-'}</td>
        <td style="padding:4px;text-align:right;font-weight:700">${cost?'$'+cost.toLocaleString(undefined,{maximumFractionDigits:0}):'-'}</td>
      </tr>`;
    });
    html+=`<tr style="border-top:2px solid var(--b);font-weight:700">
      <td colspan="4" style="padding:4px">Subtotal</td>
      <td style="padding:4px;text-align:center">${jobHrs}</td><td></td>
      <td style="padding:4px;text-align:right">$${jobCost.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
    </tr></table></div>`;
  });

  html+=`<div style="border-top:2px solid var(--g);padding-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:14px">
    <span>TOTAL: ${totalHrs.toLocaleString()} manhours</span>
    <span style="color:var(--gn)">$${totalCost.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
  </div>`;

  html+=`</div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
